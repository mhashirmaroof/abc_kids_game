name: abc_kids_game
description: "ABC Kids: Tap & Learn — Offline-first phonics app for ages 3-6."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── State Management ──────────────────────────────────────────
  flutter_riverpod: ^2.6.1          # ~Nov 2025 release

  # ── Audio ─────────────────────────────────────────────────────
  flutter_tts: ^4.2.0               # On-device TTS, fully offline, no API key
  audioplayers: ^6.1.0              # SFX (success, error sounds)

  # ── Ads ───────────────────────────────────────────────────────
  google_mobile_ads: ^5.3.0         # AdMob — child-directed config included

  # ── Storage / Preferences ─────────────────────────────────────
  shared_preferences: ^2.3.5        # First-launch detection (onboarding flag)

  # ── Animations ────────────────────────────────────────────────
  lottie: ^3.3.0                    # JSON-based animations (celebration, mascot)
  confetti: ^0.8.0                  # Confetti burst on reward milestones

  # ── Assets / Utilities ────────────────────────────────────────
  flutter_animate: ^4.5.2           # Simple tap/scale/shake animations

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false                    # iOS handled in Phase 5
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#4D96FF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/sounds/
    - assets/animations/
    - assets/icon/

  fonts:
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-Regular.ttf
        - asset: assets/fonts/Fredoka-Bold.ttf
          weight: 700
